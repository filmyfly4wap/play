<!DOCTYPE html>
<html lang="en">
<head>
  <title>PLYR PLAYER</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.css"/>
  <style>
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    html, body {
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      max-width: 100%;
    }
    .plyr {
      height: 100%;
    }
  </style>
  
        <style>
        
         .shaka-video-container {
   position: absolute;
   inset: 0;
   width: 100%;
   height: 100%;
 }
    .custom-watermark {
      position: absolute;
      z-index: 40;
      pointer-events: none;
      top: 65%;
      left: 11%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.12);
    }
    
    .custom-watermark img {
      height: 52px;
      width: 52px;
      opacity: 80%;
    }
    
    
    @media (max-width: 700px) {
      .custom-watermark {
        font-size: 9px;
        top: 58%;
        left: 4%;
      }
      
      .custom-watermark img {
        height: 45px;
        width: 45px;
        opacity: 80%;
      }
    }



</style>


</head>
<body>
  <div class="shaka-video-container">
  <video autoplay="yes" oncanplay="this.muted=true"  id="player" controls preload="metadata" controls></video>
    <div class="custom-watermark"><img src="https://i.postimg.cc/SNjy16J7/cricketlive.png"></div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.1.4/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.6.12/dist/plyr.min.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', async () => {
    const video = document.getElementById('player');

    // ====== Get URL from query param
    const urlParams = new URLSearchParams(window.location.search);
    const source = urlParams.get("url");
    if (!source) {
      document.body.innerHTML = "";
      return;
    }

    if (Hls.isSupported()) {
      const hls = new Hls({ maxMaxBufferLength: 100 });
      hls.loadSource(source);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        const availableQualities = hls.levels.map(level => level.height).filter(Boolean).sort((a, b) => b - a);
        const defaultQuality = availableQualities.includes(1080) ? 1080 : (availableQualities[0] || 360);

        const player = new Plyr(video, {
          controls: ['play-large', 'play', 'mute', 'volume', 'settings', 'fullscreen'],
          quality: {
            default: defaultQuality,
            options: availableQualities,
            forced: true,
            onChange: (quality) => {
              hls.levels.forEach((level, levelIndex) => {
                if (level.height === quality) {
                  hls.currentLevel = levelIndex;
                }
              });
            }
          }
        });

        // Force autoplay unmute
        video.muted = true; // required for autoplay to start
        video.play().then(() => {
          video.muted = false; // unmute after autoplay starts
        }).catch(err => console.log("Autoplay blocked:", err));

        document.addEventListener('fullscreenchange', () => {
          if (document.fullscreenElement) {
            if (screen.orientation && screen.orientation.lock) {
              screen.orientation.lock('landscape').catch(err => console.error('Error locking orientation:', err));
            }
          }
        });
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = source;
      new Plyr(video);
      video.muted = true;
      video.play().then(() => { video.muted = false; }).catch(err => console.log("Autoplay blocked:", err));
    } else {
      document.body.innerHTML = '<p>Your browser does not support HLS playback.</p>';
    }
  });
</script>

</body>
</html>
