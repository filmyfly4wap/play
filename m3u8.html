<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Dillzy Live Player</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="referrer" content="no-referrer"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-FMP9REY96D');
</script>

<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden;font-family:Inter,sans-serif}
.video-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;background:#000}
video,.plyr{width:100%;height:100%;background:#000}
.block-overlay{position:absolute;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#000;text-align:center}
.block-box{max-width:820px;width:88%}
.block-title{font-family:"Playfair Display",serif;font-size:32px;color:#cfd2d6;margin-bottom:12px}
.block-sub{font-size:15px;color:#9ea3a8;line-height:1.6}
:root{--plyr-color-main:#00b3ff}
</style>
</head>

<body>
<div class="video-container" id="container">
  <video id="player" controls playsinline muted preload="auto"></video>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const params = new URLSearchParams(location.search);
  const src = params.get("url"); || 
  const poster = params.get("poster");
  const video = document.getElementById("player");
  video.setAttribute("poster", poster);

  function showOverlay(title, sub) {
    const o = document.createElement("div");
    o.className = "block-overlay";
    o.innerHTML = `<div class="block-box"><div class="block-title">${title}</div><div class="block-sub">${sub}</div></div>`;
    document.getElementById("container").appendChild(o);
  }

  function isSandbox() {
    try {
      return window.self !== window.top && (window.frameElement?.hasAttribute("sandbox") || !window.frameElement);
    } catch (e) { return true; }
  }

  async function loadScript(u) {
    return new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = u; s.async = true;
      s.onload = res; s.onerror = rej;
      setTimeout(rej, 5000);
      document.body.appendChild(s);
    });
  }

  if (Hls.isSupported()) {
    const hls = new Hls({
      debug: false,
      enableWorker: true,
      lowLatencyMode: true,
      backBufferLength: 90,
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      manifestLoadingMaxRetry: 10,
      levelLoadingMaxRetry: 10,
      fragLoadingMaxRetry: 10,
      startLevel: -1
    });

    hls.loadSource(src);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
      const levels = data.levels || [];
      const qualities = [...new Set(levels.map(l => l.height))].filter(Boolean).sort((a, b) => b - a);
      
      const plyr = new Plyr(video, {
        controls: ["play-large", "play", "progress", "current-time", "mute", "volume", "settings", "fullscreen"],
        quality: {
          default: qualities.find(q => q <= 720) || qualities[0],
          options: qualities,
          forced: true,
          onChange: (v) => {
            levels.forEach((level, index) => {
              if (level.height === v) hls.currentLevel = index;
            });
          }
        }
      });
    });

    hls.on(Hls.Events.ERROR, (event, data) => {
      if (data.fatal) {
        switch (data.type) {
          case Hls.ErrorTypes.NETWORK_ERROR:
            hls.startLoad();
            break;
          case Hls.ErrorTypes.MEDIA_ERROR:
            hls.recoverMediaError();
            break;
          default:
            hls.destroy();
            break;
        }
      }
    });

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = src;
    new Plyr(video);
  }

  video.addEventListener('stalled', () => {
    video.load();
    video.play();
  });
});
</script>
</body>
</html>
