<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LIVE STREAM PLAYER</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" rel="stylesheet">
  <style>
    /* Full Screen Setup */
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    .video-container { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
    #video { width: 100%; height: 100%; object-fit: contain; }
    
    /* UI Customization */
    .shaka-overflow-menu, .shaka-settings-menu { background-color: #2962ff; }
    .shaka-current-selection-span { color: #fff; font-weight: 700; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" defer></script>
</head>

<body>
  <div class="video-container" data-shaka-player-container>
    <video data-shaka-player id="video" autoplay muted playsinline poster="https://i.postimg.cc/xdP93Ttv/thum.png"></video>
  </div>

  <script>
    // 1. URL se 'id' parameter lena (e.g., player.html?id=star-sports)
    const urlParams = new URLSearchParams(window.location.search);
    const channelId = urlParams.get('id');

    // GitHub Data URL (Apni file ka raw link yahan dalein)
    const GITHUB_DATA_URL = "https://raw.githubusercontent.com/filmyfly4wap/mpd/refs/heads/main/mpd.json";

    async function init() {
      if (!channelId) {
        console.error("No Channel ID provided in URL!");
        return;
      }

      const video = document.getElementById('video');
      const ui = video['ui'];
      const controls = ui.getControls();
      const player = controls.getPlayer();

      // UI Configuration
      ui.configure({
        controlPanelElements: ["play_pause", "mute", "volume", "spacer", "time_and_duration", "fullscreen", "overflow_menu"]
      });

      // 4. Headers Modify (Request Filter)
      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
          // Agar headers ki zaroorat ho toh yahan add karein
          request.headers['Referer'] = 'https://www.jiotv.com/';
          
          request.headers['User-Agent'] = navigator.userAgent;
        }
      });

      try {
        // 2. GitHub se data fetch karna
        const response = await fetch(GITHUB_DATA_URL);
        const data = await response.json();
        const channel = data.find(c => c.id === channelId);

        if (channel) {
          // 3. DRM Keys set karna dynamic
          player.configure({
            drm: {
              clearKeys: channel.clearkeys // Format: {"key_id": "key"}
            }
          });

          // 5. Stream load karna
          await player.load(channel.link);
          console.log("Stream Loaded Successfully!");

        } else {
          console.error("Channel not found in GitHub database.");
        }
      } catch (error) {
        console.error("Error loading stream:", error);
      }
    }

    document.addEventListener('shaka-ui-loaded', init);
  </script>
</body>
</html>
