<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Cricket Stream</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css">

<style>
body{
margin:0;
background:#000;
overflow:hidden;
}

.shaka-video-container{
position:fixed;
inset:0;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

.custom-watermark{
position:absolute;
z-index:40;
pointer-events:none;
top:65%;
left:11%;
}

.custom-watermark img{
height:52px;
width:52px;
opacity:.8;
}
</style>

</head>

<body>

<div class="shaka-video-container" id="player-container">
<video id="video" autoplay muted playsinline></video>
<div class="custom-watermark">
<img src="https://i.postimg.cc/SKhzQBJB/cricketlive.png">
</div>
</div>

<script>

const JSON_URL = "https://raw.githubusercontent.com/filmyfly4wap/mpd/refs/heads/main/mpd.json";
const COOKIE_URL = "https://allrounder-live.pages.dev/api/cookie.json";

function getParam(name){
const url = new URL(window.location.href);
return url.searchParams.get(name);
}

async function initPlayer(){

const id = getParam("id");

if(!id){
alert("Channel ID Missing");
return;
}

const json = await fetch(JSON_URL);
const channels = await json.json();

const channel = channels.find(c => c.channel_id === id);

if(!channel){
alert("Channel Not Found");
return;
}

const video = document.getElementById("video");
const container = document.getElementById("player-container");

shaka.polyfill.installAll();

if(!shaka.Player.isBrowserSupported()){
alert("Browser Not Supported");
return;
}

const player = new shaka.Player();
await player.attach(video);

const ui = new shaka.ui.Overlay(player,container,video);

ui.configure({
controlPanelElements:[
"play_pause",
"time_and_duration",
"spacer",
"quality",
"mute",
"fullscreen"
]

volumeBarColors: {
    base: 'rgb(255,255,255,1)',
    level: 'rgb(63,107,255,1)'
  },
  seekBarColors: {
    base: 'rgba(255,255,255,1)',
    buffered: 'rgba(255,255,255,1)',
    played: 'rgb(63,107,255,1)'
  }
});

player.configure({
drm:{
clearKeys:{
[channel.keyId]:channel.key
}
}
});

let cookieValue="";

try{
const response = await fetch(COOKIE_URL);
const data = await response.json();
cookieValue = data.cookie || "";
}catch(e){}

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://www.jiotv.com/";
request.headers["User-Agent"]="playtv/7.1.5";

if(cookieValue){
request.headers["Cookie"]=cookieValue;
}

});

await player.load(channel.channel_url);

video.play().catch(()=>{});

}

document.addEventListener("DOMContentLoaded",initPlayer);

</script>

</body>
</html>
