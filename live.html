<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Stream Player</title>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css">

<style>
body{
margin:0;
background:#000;
overflow:hidden;
}

.shaka-video-container{
position:fixed;
inset:0;
}

video{
width:100%;
height:100%;
object-fit:contain;
}
</style>

</head>

<body>

<div class="shaka-video-container" id="player-container">
<video id="video" autoplay muted playsinline></video>
</div>

<script>

function getParam(name){
const url=new URL(window.location.href);
return url.searchParams.get(name);
}

const streamUrl=getParam("url");
const keyId=getParam("keyId");
const key=getParam("key");

const COOKIE_URL="https://allrounder-live.pages.dev/api/cookie.json";

document.addEventListener("DOMContentLoaded",async()=>{

if(!streamUrl){
alert("Stream URL missing");
return;
}

const video=document.getElementById("video");
const container=document.getElementById("player-container");

shaka.polyfill.installAll();

if(!shaka.Player.isBrowserSupported()){
alert("Browser not supported");
return;
}

const player=new shaka.Player();
await player.attach(video);

new shaka.ui.Overlay(player,container,video);

player.configure({
drm:{
clearKeys:{
[keyId]:key
}
}
});

let cookieValue="";

try{

const response=await fetch(COOKIE_URL,{cache:"no-store"});
const data=await response.json();
cookieValue=data.cookie || "";

}catch(e){
console.log("Cookie fetch failed");
}

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://www.jiotv.com/";
request.headers["User-Agent"]="playtv/7.1.5";

if(cookieValue){

request.headers["Cookie"]=cookieValue;

let token=cookieValue.startsWith("__hdnea__=")
?cookieValue.substring(10)
:cookieValue;

if(
(type===shaka.net.NetworkingEngine.RequestType.MANIFEST ||
type===shaka.net.NetworkingEngine.RequestType.SEGMENT)
&& !request.uris[0].includes("__hdnea__")
){

const sep=request.uris[0].includes("?")?"&":"?";
request.uris[0]+=sep+"__hdnea__="+token;

}

}

});

try{

await player.load(streamUrl);
video.play().catch(()=>{});

}catch(e){

console.error("Stream load error",e);

}

});

</script>

</body>
</html>
