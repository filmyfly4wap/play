<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Live Cricket Stream - Unlocked</title>
  <meta name="referrer" content="no-referrer">

  <script
    src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js">
  </script>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    .shaka-video-container {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }



    /* Shaka UI Customization */
    .shaka-overflow-menu-button {
      display: none !important;
    }
  </style>
      <style>
    .custom-watermark {
      position: absolute;
      z-index: 40;
      pointer-events: none;
      top: 65%;
      left: 11%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.12);
    }
    
    .custom-watermark img {
      height: 52px;
      width: 52px;
      opacity: 80%;
    }
    
    
    @media (max-width: 700px) {
      .custom-watermark {
        font-size: 9px;
        top: 58%;
        left: 4%;
      }
      
      .custom-watermark img {
        height: 45px;
        width: 45px;
        opacity: 80%;
      }
    }

</style>

  
</head>

<body>

  <div class="shaka-video-container" id="player-container">
    <video id="video" autoplay muted playsinline preload="metadata"></video>
    <div class="custom-watermark"><img src="https://i.postimg.cc/SKhzQBJB/cricketlive.png"></div>
  </div>

  <script>
    (function() {
      // Configuration Settings
      const CONFIG = {
        streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_1_Hindi_BTS/output/index.mpd",
        keyId: "8ea9b607549252068e260a5f4d7dd321",
        key: "350c0aaffedf51cc1502e9543c7c885e",
        cookieUrl: "https://allrounder-live.pages.dev/api/cookie.json"
      };

      document.addEventListener("DOMContentLoaded", async () => {
        const video = document.getElementById("video");
        const container = document.getElementById("player-container");

        // Initialize Shaka Player
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) {
          console.error("Browser not supported!");
          return;
        }

        const player = new shaka.Player();
        window.player = player;
        await player.attach(video);

        // UI Setup
        const ui = new shaka.ui.Overlay(player, container, video);
        ui.configure({
          addBigPlayButton: true,
          controlPanelElements: ["play_pause", "time_and_duration",
            "spacer", "quality", "mute", "fullscreen","picture_in_picture"
          ],
          seekBarColors: {
  base: 'rgba(255,255,255,1)',
  buffered: 'rgba(255,255,255,1)',
  played: 'rgb(63,107,255,1)'
}
        });

        // DRM Setup (ClearKey)
        player.configure({
          drm: {
            clearKeys: {
              [CONFIG.keyId]: CONFIG.key
            }
          },
          manifest: {
            defaultPresentationDelay: 5
          },
          streaming: {
            lowLatencyMode: true,
            bufferingGoal: 10
          }
        });

        // Networking Filters for JioTV Auth
        let cookieValue = "";
        try {
          const response = await fetch(CONFIG.cookieUrl, {
            cache: "no-store"
          });
          const data = await response.json();
          cookieValue = data.cookie || "";
        } catch (e) {
          console.log("Cookie fetch failed, trying without it...");
        }

        player.getNetworkingEngine().registerRequestFilter((type,
          request) => {
          request.headers["Referer"] = "https://www.jiotv.com/";
          request.headers["User-Agent"] =
            "playtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

          if (cookieValue) {
            request.headers["Cookie"] = cookieValue;
            let urlCookie = cookieValue.startsWith("__hdnea__=") ?
              cookieValue.substring(10) : cookieValue;

            if ((type === shaka.net.NetworkingEngine.RequestType
                .MANIFEST || type === shaka.net.NetworkingEngine
                .RequestType.SEGMENT) && !request.uris[0].includes(
                "__hdnea__")) {
              const sep = request.uris[0].includes("?") ? "&" : "?";
              request.uris[0] += sep + "__hdnea__=" + urlCookie;
            }
          }
        });

        // Load the Stream
        try {
          await player.load(CONFIG.streamUrl);
          console.log("Stream loaded successfully!");
          video.play().catch(() => {
            console.log(
              "Autoplay blocked, user interaction needed.");
          });
        } catch (e) {
          console.error("Error loading stream:", e);
        }

        // Unmute on first play
        video.addEventListener("play", () => {
          video.muted = false;
        }, {
          once: true
        });
      });
    })();
  </script>

</body>

</html>
