
<!DOCTYPE html>

<head></head>

<body>
  <html lang="en">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <meta name="referrer" content="no-referrer">
  <script
    src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js">
  </script>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css" />


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif
    }

    .shaka-video-container {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    
  .shaka-seek-bar-container {
    display: none !important;
}
  </style>
  
  <style>
    .custom-watermark {
      position: absolute;
      z-index: 40;
      pointer-events: none;
      top: 65%;
      left: 11%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.12);
    }
    
    .custom-watermark img {
      height: 52px;
      width: 52px;
      opacity: 80%;
    }
    
    
    @media (max-width: 700px) {
      .custom-watermark {
        font-size: 9px;
        top: 58%;
        left: 4%;
      }
      
      .custom-watermark img {
        height: 45px;
        width: 45px;
        opacity: 80%;
      }
    }
</style>






  <div class="shaka-video-container" id="player-container">
    <video id="video" autoplay muted playsinline preload="metadata"></video>
    <div class="custom-watermark"><img src="https://i.postimg.cc/SNjy16J7/cricketlive.png"></div>
  </div>

  <script>
    (function() {

      function isSandboxedEnv() {
        try {
          if (window.self === window.top) return false;
          if (window.frameElement && window.frameElement.hasAttribute(
              "sandbox")) {
            return true;
          }
          try {
            document.domain = document.domain;
            if (window.frameElement && !window.frameElement.getAttribute(
                "sandbox")) {
              return false;
            }
          } catch (e) {
            return true;
          }
          return false;
        } catch (e) {
          return true;
        }
      }

      function triggerBlockScreen(title, message) {
        const container = document.getElementById("player-container");
        const video = document.getElementById("video");

        try {
          video.pause();
          video.removeAttribute('src');
          video.load();
        } catch (e) {}

        const overlay = document.createElement("div");
        overlay.className = "block-overlay";
        overlay.id = "sandbox-block-display";
        overlay.innerHTML = `
      <div class="block-box">
        <div class="block-title">${title}</div>
        <div class="block-sub">${message}</div>
      </div>
    `;
        document.body.appendChild(overlay);
        container.style.display = 'none';
      }
      if (isSandboxedEnv()) {

        triggerBlockScreen('Disable Sandbox',
          'Opening Chrome Browser Only & Disable Ad blocker');
        return;
      }
      const CONFIG = {

        streamUrl: "https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_1_Tamil_HD_BTS/output/index.mpd",
        keyId: "2272c0bc6b2e5cb090b1f55996e0026c",
        key: "943923934de1d5536ab01c67fca8b337",
        cookieUrl: "https://allrounder-live4.pages.dev/api/tamil.json"
      };


      document.addEventListener("DOMContentLoaded", async () => {

        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) return;

        const video = document.getElementById("video");
        const container = document.getElementById("player-container");

        video.muted = true;

        const player = new shaka.Player();
        await player.attach(video);

        const ui = new shaka.ui.Overlay(player, container, video);

        ui.configure({
          addBigPlayButton: true,
          controlPanelElements: [
            "mute", // First - volume/mute button
            "play_pause", // Second - play/pause button  
            "time_and_duration", // Third - timeline timings (00:00 / 00:00)
            "spacer",
            "quality",
            "picture_in_picture",
            "fullscreen"
          ],
          seekBarColors: {
  base: 'rgba(255,255,255,1)',
  buffered: 'rgba(255,255,255,1)',
  played: 'rgb(63,107,255,1)'
}
        });

        player.configure({
          drm: {
            clearKeys: {
              [CONFIG.keyId]: CONFIG.key
            }
          },
          manifest: {
            defaultPresentationDelay: 5
          },
          streaming: {
            lowLatencyMode: true,
            bufferingGoal: 10,
            rebufferingGoal: 2,
            safeSeekOffset: 5
          }
        });

        let cookieValue = "";

        try {
          const response = await fetch(CONFIG.cookieUrl, {
            cache: "no-store"
          });
          const data = await response.json();
          cookieValue = data.cookie || "";
        } catch (e) {}

        if (cookieValue) {
          player.getNetworkingEngine().registerRequestFilter((type,
            request) => {
            request.headers["Referer"] = "https://www.jiotv.com/";
            request.headers["User-Agent"] =
              "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
            request.headers["Cookie"] = cookieValue;

            let urlCookie = cookieValue.startsWith("__hdnea__=") ?
              cookieValue.substring(10) : cookieValue;

            if ((type === shaka.net.NetworkingEngine.RequestType
                .MANIFEST ||
                type === shaka.net.NetworkingEngine.RequestType
                .SEGMENT) &&
              !request.uris[0].includes("__hdnea__")) {
              const sep = request.uris[0].includes("?") ? "&" : "?";
              request.uris[0] += sep + "__hdnea__=" + urlCookie;
            }
          });
        }

        try {
          await player.load(CONFIG.streamUrl);
          video.play().catch(() => {});
        } catch (e) {}

        video.addEventListener("play", () => {
          video.muted = false;
        });

      });
    })();
  </script>
</body>

</html>
