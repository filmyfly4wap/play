
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Cache-Control"
    content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>@CRICMATCHSTREAM</title>
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css"
    rel="stylesheet">
  <style>
    html,
    body {
      box-sizing: border-box;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
    }

    *,
    ::after,
    ::before {
      box-sizing: inherit;
    }

    body {
      height: 100%;
      line-height: 1;
      margin: 0;
      outline: 0;
      overflow: hidden;
      padding: 12px;
      background: none;
    }

    .video-container {
      align-items: center;
      display: flex;
      height: 100%;
      justify-content: center;
      margin-bottom: 0;
      overflow: hidden;
      padding: 0;
      position: relative;
      width: 100%;
      background: none;
      box-shadow: none;
      border-radius: 0;
    }

    #video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 0;
    }

    img {
      position: absolute;
      top: 10px;
      left: 15px;
      height: auto;
      max-width: 115px;
      width: 100%;
      max-height: 25px;
      transition: opacity 1s ease;
    }

    @media (min-width: 1024px) {
      .video-container {
        height: 94vh;
      }

      #video {
        height: 100%;
        width: 100%;
        object-fit: fill;
      }
    }

    @media (max-width: 1023px) {
      .video-container {
        padding-bottom: 56.25%;
        min-height: 100%;
      }

      #video {
        object-fit: contain;
      }
    }

    @media (max-width: 767px) {
      img {
        max-width: 90px;
        max-height: 20px;
        left: 5px;
        top: 5px;
      }

      .shaka-overlay .shaka-controls .shaka-control-button.shaka-button-overflow-menu {
        transform: scale(0.7);
      }

      .shaka-overlay .shaka-controls {
        padding: 5px;
      }
    }

    @media (orientation: landscape) {
      .video-container {
        height: 100vh;
        padding-bottom: 0;
      }

      #video {
        object-fit: fill;
      }
    }

    .shaka-overflow-menu,
    .shaka-settings-menu {
      background-color: #2962ff;
    }

    .shaka-current-selection-span,
    .shaka-settings-menu button {
      color: #fff;
      font-weight: 700;
    }

    .shaka-overflow-menu button:hover,
    .shaka-settings-menu button:hover {
      background-color: #000;
    }

    .shaka-overflow-button-label {
      color: #ffffe6;
      font-weight: 700;
    }

    .material-icons-round {
      color: #e6e6e6;
    }

    .shaka-spinner-container {
      display: none !important;
    }
    
    
    
  </style>
    <style>
    .custom-watermark {
      position: absolute;
      z-index: 40;
      pointer-events: none;
      top: 65%;
      left: 11%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.12);
    }
    
    .custom-watermark img {
      height: 52px;
      width: 52px;
      opacity: 80%;
    }
    
    
    @media (max-width: 700px) {
      .custom-watermark {
        font-size: 9px;
        top: 58%;
        left: 4%;
      }
      
      .custom-watermark img {
        height: 45px;
        width: 45px;
        opacity: 80%;
      }
    }

  .shaka-seek-bar {
    background-color: #C3C3C3 !important;
    border-radius: 10px;
  }
  
  .shaka-seek-bar-container input[type="range"]::-webkit-slider-thumb {
  background-color: #2962ff !important; 
}

</style>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"
    crossorigin="anonymous" defer="defer"></script>
</head>

<body>
  <center>
    <div class="video-container" data-shaka-player-container><video autoplay
        data-shaka-player id="video" muted
        poster="https://i.postimg.cc/QCytSSbY/20251010-100543.jpg"
        preload="auto"></video>
        <div class="custom-watermark"><img src="https://i.postimg.cc/SKhzQBJB/cricketlive.png"></div>
</div>
        </div>
  </center>
  <script>
    let player, ui;
    async function init() {
      const e = document.getElementById("video");
      ui = e.ui;
      const r = ui.getControls();
      player = r.getPlayer(), window.player = player, window.ui = ui;
      ui.configure({
          controlPanelElements: ["play_pause", "mute", "volume", "spacer",
            "time_and_duration", "picture_in_picture", "fullscreen",
            "overflow_menu"
          ],
          volumeBarColors: {
            base: "rgba(255, 0, 150, 0.7)",
            level: "rgba(0, 204, 255, 0.7)"
          },
          seekBarColors: {
            base: "rgba(0, 204, 255, 0.7)",
            buffered: "rgba(255, 0, 150, 0.7)",
            played: "rgba(0, 204, 255, 0.7)"
          }
        }), player.configure({
          drm: {
            clearKeys: {
              "baafdb8ebcbbc0655332291da6f121da": "60ac892e0ea0b2c46fc6837c97ed641a"
            }
          }
        }), player.addEventListener("error", onPlayerErrorEvent), r
        .addEventListener("error", onUIErrorEvent);
      try {
        await player.load(
          "https://netskrt.live.pv-cdn.net/OTTB/lhr-nitro/live/clients/dash/enc/wwrmho82pc/out/v1/d7130f460d41486ea7e8e3eb45f0522f/cenc.mpd"
        )
      } catch (e) {
        onPlayerError(e)
      }
    }

    function onPlayerErrorEvent(e) {
      onPlayerError(e.detail)
    }

    function onPlayerError(e) {}

    function onUIErrorEvent(e) {
      onPlayerError(e.detail)
    }
    document.addEventListener("shaka-ui-loaded", init), document
      .addEventListener("shaka-ui-load-failed", (() => {}));
  </script>
</body>

</html>
